<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="donate.html" class="active">Donate</a>
</nav>

<main class="main">
<section class="card">
  <h2>Support the Cause</h2>
  <p>Help fund Tamil Nadu rural development, education, and health programs.</p>

  <form>
    <div class="form-group">
      <input type="text" required>
      <label>Name</label>
    </div>
    <div class="form-group">
      <input type="email" required>
      <label>Email</label>
    </div>
    <div class="form-group">
      <input type="number" required>
      <label>Amount (₹)</label>
    </div>
    <button class="btn-primary">Donate</button>
  </form>
</section>
</main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Tamil Marathon 2026</title>
    <link rel="stylesheet" href="index.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Parallax Background -->
    <div class="parallax-bg"></div>
    <div class="overlay"></div>

    <nav class="navbar">
        <a href="home.html" class="logo">
            <i class="fa-solid fa-person-running"></i> Tamil<span>Marathon</span>
        </a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="register.html">Register</a>
            <a href="events.html">Events</a>
        </div>
    </nav>

    <main style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">

        <div style="background: linear-gradient(145deg, rgba(20, 20, 20, 0.9), rgba(10, 10, 10, 0.95));
                border: 2px solid var(--secondary); padding: 3rem; border-radius: 16px; 
                max-width: 450px; width: 100%; backdrop-filter: blur(10px);
                box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);">

            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fa-solid fa-user-circle"
                    style="font-size: 4rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                <h1
                    style="font-family: var(--font-display); font-size: 3rem; margin: 0; text-transform: uppercase; color: #fff;">
                    User Login
                </h1>
                <p style="color: #999; margin-top: 0.5rem;">Access Your Dashboard</p>
            </div>

            <form id="userLoginForm">

                <div class="form-group">
                    <label for="userEmail" class="form-label">Email Address</label>
                    <div style="position: relative;">
                        <input type="email" id="userEmail" class="form-control"
                            placeholder="Enter your registered email" required>
                        <i class="fa-solid fa-envelope form-icon"></i>
                    </div>
                </div>

                <div id="errorMsg" style="display: none; background: rgba(239, 68, 68, 0.1); color: #ef4444; 
                                     padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
                    <i class="fa-solid fa-triangle-exclamation"></i> Email not found. Please register first.
                </div>

                <div id="successMsg" style="display: none; background: rgba(16, 185, 129, 0.1); color: #10b981; 
                                     padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
                    <i class="fa-solid fa-circle-check"></i> Login successful!
                </div>

                <button type="submit" class="btn-neon"
                    style="width: 100%; border-radius: 8px; margin-top: 1rem; background: var(--secondary);">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>

            </form>

            <div
                style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="color: #999; font-size: 0.9rem;">Don't have an account?</p>
                <a href="register.html" style="color: var(--primary); text-decoration: none;">
                    Register Now <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>

            <div style="text-align: center; margin-top: 1rem;">
                <a href="admin-login.html" style="color: #666; text-decoration: none; font-size: 0.9rem;">
                    <i class="fa-solid fa-shield-halved"></i> Admin Login
                </a>
            </div>

        </div>

    </main>

    <script>
        document.getElementById('userLoginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('userEmail').value.trim().toLowerCase();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            // Get registrations from localStorage
            const registrations = JSON.parse(localStorage.getItem('marathon_registrations_2026') || '[]');

            // Find user by email
            const user = registrations.find(r => r.email.toLowerCase() === email);

            if (user) {
                // User found - set session and redirect
                sessionStorage.setItem('user_logged_in', 'true');
                sessionStorage.setItem('user_email', email);
                sessionStorage.setItem('user_data', JSON.stringify(user));

                // Show success message
                errorMsg.style.display = 'none';
                successMsg.style.display = 'block';

                // Redirect after 1 second
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
            } else {
                // User not found
                successMsg.style.display = 'none';
                errorMsg.style.display = 'block';

                // Shake animation
                errorMsg.style.animation = 'shake 0.5s';
                setTimeout(() => errorMsg.style.animation = '', 500);
            }
        });

        // Add shake animation
        const style = document.createElement('style');
        style.innerHTML = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }
    `;
        document.head.appendChild(style);
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tamil Marathon 2026</title>
    <link rel="stylesheet" href="index.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.9), rgba(10, 10, 10, 0.95));
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
        }

        .registration-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(20, 20, 20, 0.9);
            border-radius: 12px;
            overflow: hidden;
        }

        .registration-table th {
            background: var(--primary);
            color: white;
            padding: 1rem;
            text-align: left;
            font-family: var(--font-display);
            font-size: 1.2rem;
        }

        .registration-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #ddd;
        }

        .registration-table tr:hover {
            background: rgba(255, 77, 0, 0.1);
        }

        @media print {
            body {
                background: white;
                color: black;
            }

            .parallax-bg,
            .overlay,
            .navbar,
            .stats-grid,
            button,
            #noData {
                display: none !important;
            }

            main {
                padding: 0 !important;
                margin: 0 !important;
                max-width: 100% !important;
            }

            .registration-table {
                background: white;
                color: black;
                box-shadow: none;
                border: 1px solid #000;
            }

            .registration-table th {
                background: #f0f0f0;
                color: black;
                border: 1px solid #000;
            }

            .registration-table td {
                color: black;
                border: 1px solid #000;
            }

            h1,
            h2,
            p {
                color: black !important;
            }
        }
    </style>
</head>

<body>

    <!-- Parallax Background -->
    <div class="parallax-bg"></div>
    <div class="overlay"></div>

    <nav class="navbar">
        <a href="home.html" class="logo">
            <i class="fa-solid fa-person-running"></i> Tamil<span>Marathon</span>
        </a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="#" onclick="logout()" style="color: var(--primary);">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </nav>

    <main style="padding: 8rem 5% 4rem; max-width: 1400px; margin: 0 auto;">

        <div style="margin-bottom: 3rem;">
            <h1 style="font-family: var(--font-display); font-size: 3.5rem; margin: 0;">
                <i class="fa-solid fa-gauge-high"></i> Admin Dashboard
            </h1>
            <p style="color: #999; margin-top: 0.5rem;">Welcome, <span id="adminName">Admin</span></p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">

            <div class="stat-card">
                <i class="fa-solid fa-users" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
                <h3 style="font-family: var(--font-display); font-size: 2.5rem; margin: 0;" id="totalRegistrations">0
                </h3>
                <p style="color: #999; margin: 0.5rem 0 0;">Total Registrations</p>
            </div>

            <div class="stat-card">
                <i class="fa-solid fa-person-running"
                    style="font-size: 3rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                <h3 style="font-family: var(--font-display); font-size: 2.5rem; margin: 0;" id="fullMarathon">0</h3>
                <p style="color: #999; margin: 0.5rem 0 0;">Full Marathon</p>
            </div>

            <div class="stat-card">
                <i class="fa-solid fa-road" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
                <h3 style="font-family: var(--font-display); font-size: 2.5rem; margin: 0;" id="halfMarathon">0</h3>
                <p style="color: #999; margin: 0.5rem 0 0;">Half Marathon</p>
            </div>

            <div class="stat-card">
                <i class="fa-solid fa-chart-line"
                    style="font-size: 3rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                <h3 style="font-family: var(--font-display); font-size: 2.5rem; margin: 0;" id="others">0</h3>
                <p style="color: #999; margin: 0.5rem 0 0;">5K & 10K</p>
            </div>

        </div>

        <!-- Registrations Table -->
        <div
            style="background: rgba(20, 20, 20, 0.9); padding: 2rem; border-radius: 16px; border: 1px solid var(--glass-border);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="font-family: var(--font-display); font-size: 2rem; margin: 0;">All Registrations</h2>
                <button onclick="printReport()" class="btn-primary"
                    style="background: var(--secondary); cursor: pointer;">
                    <i class="fa-solid fa-print"></i> Print Report
                </button>
            </div>

            <div id="tableContainer" style="overflow-x: auto;">
                <table class="registration-table" id="registrationsTable">
                    <style>
                        .btn-action {
                            border: none;
                            padding: 0.5rem;
                            border-radius: 6px;
                            cursor: pointer;
                            margin: 0 0.2rem;
                            color: white;
                            transition: transform 0.2s;
                        }

                        .btn-action:hover {
                            transform: scale(1.1);
                        }

                        .btn-edit {
                            background: var(--secondary);
                        }

                        .btn-delete {
                            background: #ef4444;
                            /* Red for delete */
                        }

                        /* Modal Styles */
                        .modal {
                            display: none;
                            position: fixed;
                            z-index: 1000;
                            left: 0;
                            top: 0;
                            width: 100%;
                            height: 100%;
                            background-color: rgba(0, 0, 0, 0.8);
                            justify-content: center;
                            align-items: center;
                        }

                        .modal-content {
                            background: #1a1a1a;
                            padding: 2rem;
                            border-radius: 12px;
                            border: 1px solid var(--glass-border);
                            width: 90%;
                            max-width: 500px;
                            position: relative;
                            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
                        }

                        .modal-field {
                            margin-bottom: 1rem;
                        }

                        .modal-field label {
                            display: block;
                            margin-bottom: 0.5rem;
                            color: #bbb;
                        }

                        .modal-field input,
                        .modal-field select {
                            width: 100%;
                            padding: 0.8rem;
                            background: rgba(255, 255, 255, 0.05);
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            border-radius: 6px;
                            color: white;
                        }

                        .modal-actions {
                            display: flex;
                            justify-content: flex-end;
                            gap: 1rem;
                            margin-top: 1.5rem;
                        }
                    </style>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Category</th>
                            <th>Gender</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Injected via JavaScript -->
                    </tbody>
                </table>
            </div>

            <p id="noData" style="text-align: center; color: #666; padding: 2rem; display: none;">No registrations yet
            </p>
        </div>

    </main>

    <!-- Edit User Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 style="font-family: var(--font-display); margin-top: 0; margin-bottom: 1.5rem;">Edit User</h2>

            <div class="modal-field">
                <label>Full Name</label>
                <input type="text" id="editFullname">
            </div>

            <div class="modal-field">
                <label>Email</label>
                <input type="email" id="editEmail">
            </div>

            <div class="modal-field">
                <label>Age</label>
                <input type="number" id="editAge">
            </div>

            <div class="modal-field">
                <label>Category</label>
                <select id="editCategory">
                    <option value="Full">Full Marathon (42km)</option>
                    <option value="Half">Half Marathon (21km)</option>
                    <option value="10K">10K Run</option>
                    <option value="5K">5K Run</option>
                </select>
            </div>

            <div class="modal-field">
                <label>Gender</label>
                <select id="editGender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="modal-actions">
                <button onclick="closeEditModal()"
                    style="background: transparent; border: 1px solid #666; color: #ccc; padding: 0.8rem 1.5rem; border-radius: 6px; cursor: pointer;">Cancel</button>
                <button onclick="saveUserChanges()" class="btn-primary" style="padding: 0.8rem 1.5rem;">Save
                    Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        if (!sessionStorage.getItem('admin_logged_in')) {
            window.location.href = 'admin-login.html';
        }

        // Load admin username
        const adminName = sessionStorage.getItem('admin_username') || 'Admin';
        document.getElementById('adminName').textContent = adminName;

        // Global registrations array
        let registrations = JSON.parse(localStorage.getItem('marathon_registrations_2026') || '[]');
        let currentEditIndex = -1;

        // Initialize
        renderTable();
        updateStats();

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const tableContainer = document.getElementById('tableContainer');
            const noData = document.getElementById('noData');

            tbody.innerHTML = '';

            if (registrations.length === 0) {
                noData.style.display = 'block';
                tableContainer.style.display = 'none';
                return;
            }

            noData.style.display = 'none';
            tableContainer.style.display = 'block';

            registrations.forEach((reg, index) => {
                const date = new Date(reg.timestamp || Date.now()).toLocaleDateString();
                tbody.innerHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${reg.fullname}</strong></td>
                        <td>${reg.email}</td>
                        <td>${reg.age}</td>
                        <td><span style="background: var(--primary); padding: 0.3rem 0.8rem; border-radius: 4px;">${reg.category}</span></td>
                        <td>${reg.gender}</td>
                        <td>${date}</td>
                        <td>
                            <button onclick="openEditModal(${index})" class="btn-action btn-edit" title="Edit">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="deleteUser(${index})" class="btn-action btn-delete" title="Delete">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function updateStats() {
            document.getElementById('totalRegistrations').textContent = registrations.length;

            const stats = {
                Full: 0,
                Half: 0,
                Others: 0
            };

            registrations.forEach(r => {
                if (r.category === 'Full') stats.Full++;
                else if (r.category === 'Half') stats.Half++;
                else stats.Others++;
            });

            document.getElementById('fullMarathon').textContent = stats.Full;
            document.getElementById('halfMarathon').textContent = stats.Half;
            document.getElementById('others').textContent = stats.Others;
        }

        function deleteUser(index) {
            if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                registrations.splice(index, 1);
                localStorage.setItem('marathon_registrations_2026', JSON.stringify(registrations));
                renderTable();
                updateStats();
            }
        }

        function openEditModal(index) {
            currentEditIndex = index;
            const user = registrations[index];

            document.getElementById('editFullname').value = user.fullname;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editAge').value = user.age;
            document.getElementById('editCategory').value = user.category;
            document.getElementById('editGender').value = user.gender;

            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditIndex = -1;
        }

        function saveUserChanges() {
            if (currentEditIndex === -1) return;

            const updatedUser = {
                ...registrations[currentEditIndex], // Keep timestamp and other hidden fields
                fullname: document.getElementById('editFullname').value,
                email: document.getElementById('editEmail').value,
                age: document.getElementById('editAge').value,
                category: document.getElementById('editCategory').value,
                gender: document.getElementById('editGender').value
            };

            registrations[currentEditIndex] = updatedUser;
            localStorage.setItem('marathon_registrations_2026', JSON.stringify(registrations));

            closeEditModal();
            renderTable();
            updateStats();
        }

        function logout() {
            sessionStorage.removeItem('admin_logged_in');
            sessionStorage.removeItem('admin_username');
            window.location.href = 'admin-login.html';
        }

        function printReport() {
            window.print();
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                closeEditModal();
            }
        }
    </script>

</body>

</html>

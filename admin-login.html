<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tamil Marathon 2026</title>
    <link rel="stylesheet" href="index.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Parallax Background -->
    <div class="parallax-bg"></div>
    <div class="overlay"></div>

    <nav class="navbar">
        <a href="home.html" class="logo">
            <i class="fa-solid fa-person-running"></i> Tamil<span>Marathon</span>
        </a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="register.html">Register</a>
            <a href="events.html">Events</a>
        </div>
    </nav>

    <main style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">

        <div style="background: linear-gradient(145deg, rgba(20, 20, 20, 0.9), rgba(10, 10, 10, 0.95));
                border: 2px solid var(--primary); padding: 3rem; border-radius: 16px; 
                max-width: 450px; width: 100%; backdrop-filter: blur(10px);
                box-shadow: 0 0 30px rgba(255, 77, 0, 0.2);">

            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fa-solid fa-shield-halved"
                    style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;"></i>
                <h1
                    style="font-family: var(--font-display); font-size: 3rem; margin: 0; text-transform: uppercase; color: #fff;">
                    Admin Login
                </h1>
                <p style="color: #999; margin-top: 0.5rem;">Authorized Access Only</p>
            </div>

            <form id="adminLoginForm">

                <div class="form-group">
                    <label for="adminUsername" class="form-label">Username</label>
                    <div style="position: relative;">
                        <input type="text" id="adminUsername" class="form-control" placeholder="Enter admin username"
                            required>
                        <i class="fa-solid fa-user form-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="adminPassword" class="form-label">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="adminPassword" class="form-control" placeholder="Enter password"
                            required>
                        <i class="fa-solid fa-lock form-icon"></i>
                    </div>
                </div>

                <div id="errorMsg" style="display: none; background: rgba(239, 68, 68, 0.1); color: #ef4444; 
                                     padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
                    <i class="fa-solid fa-triangle-exclamation"></i> Invalid credentials
                </div>

                <button type="submit" class="btn-neon" style="width: 100%; border-radius: 8px; margin-top: 1rem;">
                    <i class="fa-solid fa-right-to-bracket"></i> Login to Dashboard
                </button>

            </form>

            <div
                style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="color: #999; font-size: 0.9rem;">Not an admin?</p>
                <a href="user-login.html" style="color: var(--secondary); text-decoration: none;">
                    Login as User <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>

        </div>

    </main>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value;
            const errorMsg = document.getElementById('errorMsg');

            // Admin credentials (in production, this should be server-side)
            if (username === 'admin' && password === 'admin123') {
                // Set admin session
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_username', username);

                // Redirect to admin dashboard
                window.location.href = 'admin-dashboard.html';
            } else {
                // Show error
                errorMsg.style.display = 'block';
                document.getElementById('adminPassword').value = '';

                // Shake animation
                errorMsg.style.animation = 'shake 0.5s';
                setTimeout(() => errorMsg.style.animation = '', 500);
            }
        });

        // Add shake animation
        const style = document.createElement('style');
        style.innerHTML = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }
    `;
        document.head.appendChild(style);
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Tamil Marathon 2026</title>
  <link rel="stylesheet" href="index.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .login-choice-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(20, 20, 20, 0.8), #000);
    }

    .login-card {
      background: rgba(20, 20, 20, 0.6);
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 3rem;
      text-align: center;
      max-width: 800px;
      width: 90%;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      animation: fadeIn 1s ease-out;
    }

    .login-header h1 {
      font-family: var(--font-display, sans-serif);
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(45deg, #fff, #ccc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-header p {
      color: #aaa;
      font-size: 1.2rem;
      margin-bottom: 3rem;
    }

    .choices-wrapper {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .choice-btn {
      flex: 1;
      min-width: 250px;
      padding: 2rem;
      border-radius: 16px;
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .choice-btn i {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    .choice-btn h2 {
      font-family: var(--font-display, sans-serif);
      font-size: 1.5rem;
      margin: 0;
      text-transform: uppercase;
    }

    /* User Style */
    .btn-user {
      background: linear-gradient(145deg, rgba(0, 229, 255, 0.1), rgba(0, 0, 0, 0.4));
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
    }

    .btn-user:hover {
      transform: translateY(-5px);
      background: linear-gradient(145deg, rgba(0, 229, 255, 0.2), rgba(0, 0, 0, 0.6));
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
      border-color: var(--secondary, #00e5ff);
    }

    .btn-user i,
    .btn-user h2 {
      color: var(--secondary, #00e5ff);
    }

    /* Admin Style */
    .btn-admin {
      background: linear-gradient(145deg, rgba(255, 77, 0, 0.1), rgba(0, 0, 0, 0.4));
      box-shadow: 0 0 20px rgba(255, 77, 0, 0.1);
    }

    .btn-admin:hover {
      transform: translateY(-5px);
      background: linear-gradient(145deg, rgba(255, 77, 0, 0.2), rgba(0, 0, 0, 0.6));
      box-shadow: 0 0 30px rgba(255, 77, 0, 0.4);
      border-color: var(--primary, #ff4d00);
    }

    .btn-admin i,
    .btn-admin h2 {
      color: var(--primary, #ff4d00);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- Parallax Background -->
  <div class="parallax-bg"></div>
  <div class="overlay"></div>

  <div class="login-choice-container">
    <div class="login-card">
      <div class="login-header">
        <h1>Tamil Marathon 2026</h1>
        <p>Select your portal to continue</p>
      </div>

      <div class="choices-wrapper">
        <!-- Admin Portal -->
        <a href="admin-login.html" class="choice-btn btn-admin">
          <i class="fa-solid fa-shield-halved"></i>
          <h2>Admin Login</h2>
          <span style="color: #999; font-size: 0.9rem;">Organizers & Staff</span>
        </a>

        <!-- User Portal -->
        <a href="user-login.html" class="choice-btn btn-user">
          <i class="fa-solid fa-users"></i>
          <h2>User Login</h2>
          <span style="color: #999; font-size: 0.9rem;">Participants & Runners</span>
        </a>
      </div>

      <div style="margin-top: 2rem;">
        <a href="register.html" style="color: #fff; text-decoration: underline; font-size: 0.9rem; opacity: 0.7;">
          New Participant? Register Here
        </a>
      </div>
    </div>
  </div>

</body>

</html>
